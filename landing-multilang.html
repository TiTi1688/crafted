<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crafted — Your Creative Team</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0d0b;
    --cream: #f5f0e8;
    --warm: #e8dfc8;
    --accent: #c9572a;
    --muted: #7a7060;
    --card: #fffdf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* ── LANGUAGE SWITCHER ── */
  .lang-switcher {
    display: flex;
    gap: 2px;
    background: rgba(15,13,11,0.08);
    border-radius: 3px;
    padding: 3px;
  }

  .lang-btn {
    padding: 0.3rem 0.7rem;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    font-family: inherit;
  }

  .lang-btn.active {
    background: var(--ink);
    color: var(--cream);
  }

  .lang-btn:hover:not(.active) {
    background: rgba(15,13,11,0.1);
    color: var(--ink);
  }

  /* ── NAV ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.6rem 4rem;
    border-bottom: 1px solid rgba(15,13,11,0.1);
    position: sticky;
    top: 0;
    background: rgba(245,240,232,0.93);
    backdrop-filter: blur(14px);
    z-index: 100;
    gap: 1rem;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent); }

  .nav-cta {
    background: var(--ink);
    color: var(--cream);
    padding: 0.55rem 1.3rem;
    border-radius: 2px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .nav-cta:hover { background: var(--accent); }

  /* ── HERO ── */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 88vh;
    padding: 0 4rem;
    align-items: center;
    gap: 4rem;
  }

  .hero-left { padding: 4rem 0; }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }
  .eyebrow::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 4.5vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }
  h1 em { font-style: italic; color: var(--accent); }

  .hero-desc {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--muted);
    max-width: 44ch;
    margin-bottom: 2.5rem;
  }

  .hero-cta-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 0.9rem 2rem;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary:hover { background: #a8441e; transform: translateY(-1px); }

  .hero-note { font-size: 0.8rem; color: var(--muted); }

  /* HERO CARDS */
  .hero-right {
    position: relative;
    height: 500px;
  }

  .service-card {
    position: absolute;
    background: var(--card);
    border: 1px solid rgba(15,13,11,0.12);
    border-radius: 6px;
    padding: 1.8rem;
    box-shadow: 0 4px 24px rgba(15,13,11,0.06);
  }
  .service-card:nth-child(1) { width: 260px; top: 40px; left: 20px; animation: floatA 6s ease-in-out infinite; }
  .service-card:nth-child(2) { width: 240px; top: 160px; right: 10px; animation: floatB 7s ease-in-out infinite; }
  .service-card:nth-child(3) { width: 220px; bottom: 60px; left: 60px; animation: floatC 5.5s ease-in-out infinite; }

  @keyframes floatA { 0%,100%{transform:rotate(-3deg) translateY(0)} 50%{transform:rotate(-3deg) translateY(-10px)} }
  @keyframes floatB { 0%,100%{transform:rotate(2deg) translateY(0)} 50%{transform:rotate(2deg) translateY(-8px)} }
  @keyframes floatC { 0%,100%{transform:rotate(-1deg) translateY(0)} 50%{transform:rotate(-1deg) translateY(-12px)} }

  .card-icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; margin-bottom:1rem; }
  .card-icon.orange { background:#fde8df; }
  .card-icon.blue { background:#dfeafde0; }
  .card-icon.green { background:#dff5e8; }

  .service-card h3 { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; margin-bottom:0.4rem; }
  .service-card p { font-size:0.8rem; color:var(--muted); line-height:1.5; }

  /* MARQUEE */
  .marquee-strip {
    border-top: 1px solid rgba(15,13,11,0.1);
    border-bottom: 1px solid rgba(15,13,11,0.1);
    background: var(--ink);
    color: var(--cream);
    padding: 0.8rem 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .marquee-inner { display:inline-flex; animation:marquee 22s linear infinite; gap:3.5rem; }
  .marquee-inner span { font-size:0.72rem; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; opacity:0.65; }
  .marquee-inner .dot { color:var(--accent); opacity:1; }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* SERVICES */
  .services { padding: 7rem 4rem; }

  .section-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .section-label::before { content:''; width:20px; height:1px; background:var(--accent); display:inline-block; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 4rem;
    max-width: 22ch;
    line-height: 1.1;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
    background: rgba(15,13,11,0.1);
    border: 1.5px solid rgba(15,13,11,0.1);
  }

  .service-item {
    background: var(--cream);
    padding: 2.5rem;
    transition: background 0.2s;
  }
  .service-item:hover { background: var(--card); }

  .service-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: rgba(15,13,11,0.07);
    margin-bottom: 1rem;
    line-height: 1;
  }

  .service-item h3 { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; margin-bottom:0.6rem; }
  .service-item p { font-size:0.87rem; color:var(--muted); line-height:1.65; }

  .service-tag {
    display:inline-block;
    margin-top:1rem;
    font-size:0.68rem;
    font-weight:500;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:0.18rem 0.55rem;
    border-radius:2px;
  }

  /* PROCESS */
  .process {
    padding: 7rem 4rem;
    background: var(--ink);
    color: var(--cream);
  }
  .process .section-label { color:var(--accent); }
  .process .section-label::before { background:var(--accent); }

  .process-steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3rem;
    margin-top: 4rem;
  }

  .step { position:relative; }
  .step::after { content:'→'; position:absolute; right:-1.5rem; top:0.1rem; font-size:1.2rem; color:rgba(245,240,232,0.2); }
  .step:last-child::after { display:none; }

  .step-num { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--accent); line-height:1; margin-bottom:1rem; }
  .step h3 { font-family:'Playfair Display',serif; font-size:1.05rem; margin-bottom:0.6rem; }
  .step p { font-size:0.84rem; line-height:1.65; color:rgba(245,240,232,0.5); }

  /* WAITLIST */
  .waitlist {
    padding: 8rem 4rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: center;
  }

  .waitlist-left .section-title { margin-bottom:1.5rem; }
  .waitlist-left p { font-size:1rem; color:var(--muted); line-height:1.75; max-width:40ch; }

  .counter-row { display:flex; gap:3rem; margin-top:2.5rem; }
  .counter-item span { display:block; font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:900; color:var(--accent); line-height:1; }
  .counter-item small { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }

  .waitlist-form {
    background: var(--card);
    border: 1px solid rgba(15,13,11,0.1);
    border-radius: 6px;
    padding: 3rem;
    box-shadow: 0 8px 40px rgba(15,13,11,0.06);
  }

  .waitlist-form h3 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; margin-bottom:0.4rem; }
  .waitlist-form .sub { font-size:0.85rem; color:var(--muted); margin-bottom:2rem; }

  .form-group { margin-bottom:1.2rem; }
  .form-group label { display:block; font-size:0.72rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; }

  .form-group input,
  .form-group select {
    width:100%; padding:0.8rem 1rem;
    border:1px solid rgba(15,13,11,0.15);
    border-radius:3px;
    background:var(--cream);
    font-family:inherit; font-size:0.9rem;
    color:var(--ink); outline:none;
    transition:border-color 0.2s;
    appearance:none;
  }
  .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
  .form-group input::placeholder { color:var(--muted); opacity:0.55; }

  .btn-submit {
    width:100%; padding:1rem;
    background:var(--accent); color:white;
    border:none; border-radius:3px;
    font-family:inherit; font-size:0.88rem; font-weight:500;
    letter-spacing:0.06em; text-transform:uppercase;
    cursor:pointer; transition:all 0.2s; margin-top:0.5rem;
  }
  .btn-submit:hover { background:#a8441e; transform:translateY(-1px); }

  .form-note { font-size:0.75rem; color:var(--muted); text-align:center; margin-top:1rem; line-height:1.5; }

  /* SUCCESS */
  .success-state { display:none; text-align:center; padding:2rem 0; }
  .success-state .check { font-size:3rem; margin-bottom:1rem; }
  .success-state h3 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; }
  .success-state p { font-size:0.9rem; color:var(--muted); line-height:1.65; }
  .position-badge { display:inline-block; background:var(--accent); color:white; padding:0.3rem 1rem; border-radius:20px; font-size:0.85rem; font-weight:500; margin:1rem 0; }

  /* FOOTER */
  footer {
    border-top: 1px solid rgba(15,13,11,0.1);
    padding: 2.5rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  footer p { font-size:0.8rem; color:var(--muted); }

  /* FADE */
  .fade-up { opacity:0; transform:translateY(28px); animation:fadeUp 0.7s ease forwards; }
  .fade-up:nth-child(1){animation-delay:0.1s}
  .fade-up:nth-child(2){animation-delay:0.25s}
  .fade-up:nth-child(3){animation-delay:0.4s}
  .fade-up:nth-child(4){animation-delay:0.5s}
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }

  /* RESPONSIVE */
  @media (max-width:900px) {
    nav { padding:1.4rem 1.5rem; }
    .hero { grid-template-columns:1fr; padding:3rem 1.5rem; min-height:auto; }
    .hero-right { display:none; }
    .services { padding:4rem 1.5rem; }
    .services-grid { grid-template-columns:1fr; }
    .process { padding:4rem 1.5rem; }
    .process-steps { grid-template-columns:1fr 1fr; }
    .waitlist { grid-template-columns:1fr; padding:4rem 1.5rem; gap:3rem; }
    footer { padding:2rem 1.5rem; flex-direction:column; gap:0.5rem; text-align:center; }
    .nav-right { gap:0.8rem; }
    .nav-cta { display:none; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">Craf<span>t</span>ed</div>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>
    <a href="#waitlist" class="nav-cta" data-i18n="nav_cta"></a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <div class="eyebrow fade-up" data-i18n="hero_eyebrow"></div>
    <h1 class="fade-up" data-i18n-html="hero_h1"></h1>
    <p class="hero-desc fade-up" data-i18n="hero_desc"></p>
    <div class="hero-cta-row fade-up">
      <a href="#waitlist" class="btn-primary" data-i18n="hero_cta"></a>
      <span class="hero-note" data-i18n="hero_note"></span>
    </div>
  </div>

  <div class="hero-right">
    <div class="service-card">
      <div class="card-icon orange">🎬</div>
      <h3 data-i18n="card1_title"></h3>
      <p data-i18n="card1_desc"></p>
    </div>
    <div class="service-card">
      <div class="card-icon blue">⚡</div>
      <h3 data-i18n="card2_title"></h3>
      <p data-i18n="card2_desc"></p>
    </div>
    <div class="service-card">
      <div class="card-icon green">✦</div>
      <h3 data-i18n="card3_title"></h3>
      <p data-i18n="card3_desc"></p>
    </div>
  </div>
</section>

<!-- MARQUEE (static multilingual mix) -->
<div class="marquee-strip">
  <div class="marquee-inner" id="marquee-inner"></div>
</div>

<!-- SERVICES -->
<section class="services" id="services">
  <div class="section-label" data-i18n="services_label"></div>
  <h2 class="section-title" data-i18n="services_title"></h2>
  <div class="services-grid">
    <div class="service-item">
      <div class="service-num">01</div>
      <h3 data-i18n="s1_title"></h3>
      <p data-i18n="s1_desc"></p>
      <span class="service-tag" data-i18n="tag_popular"></span>
    </div>
    <div class="service-item">
      <div class="service-num">02</div>
      <h3 data-i18n="s2_title"></h3>
      <p data-i18n="s2_desc"></p>
      <span class="service-tag" data-i18n="tag_demand"></span>
    </div>
    <div class="service-item">
      <div class="service-num">03</div>
      <h3 data-i18n="s3_title"></h3>
      <p data-i18n="s3_desc"></p>
    </div>
    <div class="service-item">
      <div class="service-num">04</div>
      <h3 data-i18n="s4_title"></h3>
      <p data-i18n="s4_desc"></p>
    </div>
    <div class="service-item">
      <div class="service-num">05</div>
      <h3 data-i18n="s5_title"></h3>
      <p data-i18n="s5_desc"></p>
    </div>
    <div class="service-item">
      <div class="service-num">06</div>
      <h3 data-i18n="s6_title"></h3>
      <p data-i18n="s6_desc"></p>
      <span class="service-tag" data-i18n="tag_custom"></span>
    </div>
  </div>
</section>

<!-- PROCESS -->
<section class="process">
  <div class="section-label" data-i18n="process_label"></div>
  <h2 class="section-title" style="color:var(--cream);max-width:none;" data-i18n="process_title"></h2>
  <div class="process-steps">
    <div class="step">
      <div class="step-num">01</div>
      <h3 data-i18n="p1_title"></h3>
      <p data-i18n="p1_desc"></p>
    </div>
    <div class="step">
      <div class="step-num">02</div>
      <h3 data-i18n="p2_title"></h3>
      <p data-i18n="p2_desc"></p>
    </div>
    <div class="step">
      <div class="step-num">03</div>
      <h3 data-i18n="p3_title"></h3>
      <p data-i18n="p3_desc"></p>
    </div>
    <div class="step">
      <div class="step-num">04</div>
      <h3 data-i18n="p4_title"></h3>
      <p data-i18n="p4_desc"></p>
    </div>
  </div>
</section>

<!-- WAITLIST -->
<section class="waitlist" id="waitlist">
  <div class="waitlist-left">
    <div class="section-label" data-i18n="waitlist_label"></div>
    <h2 class="section-title" data-i18n="waitlist_title"></h2>
    <p data-i18n="waitlist_desc"></p>
    <div class="counter-row">
      <div class="counter-item">
        <span id="count">--</span>
        <small data-i18n="counter_joined"></small>
      </div>
      <div class="counter-item">
        <span>50</span>
        <small data-i18n="counter_spots"></small>
      </div>
      <div class="counter-item">
        <span>30%</span>
        <small data-i18n="counter_discount"></small>
      </div>
    </div>
  </div>

  <div class="waitlist-form">
    <div id="form-state">
      <h3 data-i18n="form_title"></h3>
      <p class="sub" data-i18n="form_sub"></p>
      <div class="form-group">
        <label data-i18n="label_name"></label>
        <input type="text" id="inp-name" data-i18n-placeholder="ph_name">
      </div>
      <div class="form-group">
        <label data-i18n="label_email"></label>
        <input type="email" id="inp-email" placeholder="hello@example.com">
      </div>
      <div class="form-group">
        <label data-i18n="label_service"></label>
        <select id="inp-service">
          <option value="" data-i18n="opt_placeholder"></option>
          <option data-i18n="opt1"></option>
          <option data-i18n="opt2"></option>
          <option data-i18n="opt3"></option>
          <option data-i18n="opt4"></option>
          <option data-i18n="opt5"></option>
          <option data-i18n="opt6"></option>
        </select>
      </div>
      <div class="form-group">
        <label data-i18n="label_contact"></label>
        <input type="text" id="inp-contact" data-i18n-placeholder="ph_contact">
      </div>
      <button class="btn-submit" onclick="submitForm()" data-i18n="btn_submit"></button>
      <p class="form-note" data-i18n="form_note"></p>
    </div>
    <div class="success-state" id="success-state">
      <div class="check">🎉</div>
      <h3 data-i18n="success_title"></h3>
      <div class="position-badge" id="position-badge"></div>
      <p data-i18n="success_desc"></p>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="logo">Craf<span>t</span>ed</div>
  <p data-i18n="footer_copy"></p>
</footer>

<script>
// ═══════════════════════════════════════════
//  TRANSLATIONS
// ═══════════════════════════════════════════
const T = {
  zh: {
    nav_cta: "加入等待名单",
    hero_eyebrow: "按需创意服务",
    hero_h1: "你的想法，<br><em>我们来实现</em>",
    hero_desc: "无论是视频剪辑、AI 自动化、平面设计还是网站开发——Crafted 是你专属的创意执行团队，告诉我们你需要什么，我们来搞定。",
    hero_cta: "申请早期访问",

// ═══════════════════════════════════════════
//  I18N ENGINE
// ═══════════════════════════════════════════
let currentLang = 'zh';

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  // Update button states
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === { zh:'中文', en:'EN', ja:'日本語' }[lang]);
  });

  const t = T[lang];

  // Text nodes
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });

  // HTML nodes (for h1 with <em> and <br>)
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // Placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  // Marquee
  buildMarquee(t.marquee);
}

function buildMarquee(items) {
  const doubled = [...items, ...items];
  const inner = document.getElementById('marquee-inner');
  inner.innerHTML = doubled.map(item =>
    `<span>${item}</span><span class="dot">◆</span>`
  ).join('');
}

// ═══════════════════════════════════════════
//  WAITLIST
// ═══════════════════════════════════════════
const KEY = 'crafted_waitlist_v2';
let baseCount = 23;

function getWaitlist() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
}
function saveWaitlist(list) {
  localStorage.setItem(KEY, JSON.stringify(list));
}

function updateCounter() {
  document.getElementById('count').textContent = baseCount;
}

function submitForm() {
  const t = T[currentLang];
  const name = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const service = document.getElementById('inp-service').value;

  if (!name) { alert(t.err_name); return; }
  if (!email || !email.includes('@')) { alert(t.err_email); return; }
  if (!service) { alert(t.err_service); return; }

  const contact = document.getElementById('inp-contact').value.trim();
  const list = getWaitlist();

  if (list.find(e => e.email === email)) {
    alert(t.err_dup);
    return;
  }

  list.push({ name, email, service, contact, lang: currentLang, joinedAt: new Date().toISOString() });
  saveWaitlist(list);

  const position = 23 + list.length;
  const posText = t.success_position.replace('{n}', position);
  document.getElementById('position-badge').textContent = posText;
  document.getElementById('form-state').style.display = 'none';
  document.getElementById('success-state').style.display = 'block';

  baseCount = position;
  updateCounter();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.addEventListener('load', () => {
  const list = getWaitlist();
  baseCount = Math.max(23, 23 + list.length);
  updateCounter();

  // Auto-detect language from browser
  const browserLang = navigator.language.slice(0, 2);
  const defaultLang = ['zh', 'en', 'ja'].includes(browserLang) ? browserLang : 'zh';
  setLang(defaultLang);

  // Live count bump
  setTimeout(() => { baseCount++; updateCounter(); }, 4500);
});
</script>
